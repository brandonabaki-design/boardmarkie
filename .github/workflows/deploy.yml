name: Deploy to GitHub Pages

on:
  push:
    branches: [main, claude/nice-rubin-1pgylk]
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build static site
        run: npm run build
        env:
          # Pages serves the project at /<repo>; base path must match.
          PAGES_BASE_PATH: ${{ steps.pages.outputs.base_path }}
          # Optional: bake in a Firebase web config so cross-device sync needs no
          # per-device setup. Unset → each browser pastes its config in
          # Settings → Sync instead. (Not a secret: access is enforced by
          # Firestore security rules + Auth.) Set repo secret FIREBASE_CONFIG to
          # the firebaseConfig JSON to enable.
          NEXT_PUBLIC_FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}

      - name: Disable Jekyll (serve _next/* as-is)
        run: touch out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
